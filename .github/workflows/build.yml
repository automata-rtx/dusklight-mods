name: Build mods

# Mods-only CI: compiles the mod libraries against the Dusklight mod SDK - the game and aurora
# are NEVER compiled here.
#
# Platform: extern/dusklight is pinned to a MAINLINE Dusklight commit (the #2215 "Game ABI /
# headers refactoring" mod SDK: static modmeta metadata, MOD_ABI_VERSION 1, headers under
# sdk/include/mods, add_mod FEATURES). The Linux job fully compile-checks every mod (game/webgpu
# symbols are left undefined and resolved at load). The Windows job, which links the real import
# library into shippable .dusk packages, only runs when a matching mainline platform release is
# configured (see below) - the old platform-v1 dusklight.lib is a different ABI and must NOT be
# used against this SDK.

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Compile check + WGSL validation (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install ninja-build unzip

      - name: Configure
        run: cmake -B build -G Ninja -DMODS_BUILD_TOOLS=ON

      - name: Build mods + validator
        run: cmake --build build

      - name: Verify mod bundle layout (new /lib/<platform>/ layout, not old root-level)
        run: |
          shopt -s nullglob
          pkgs=(build/mods/*.dusk)
          if [ ${#pkgs[@]} -eq 0 ]; then echo "no .dusk packages produced"; exit 1; fi
          status=0
          for d in "${pkgs[@]}"; do
            echo "=== $(basename "$d") ==="
            unzip -Z1 "$d"
            # The mainline loader rejects any native library at the zip root (old layout);
            # the new add_mod stages it at lib/<platform>/mod.<ext>.
            if unzip -Z1 "$d" | grep -qE '^[^/]+\.(so|dll|dylib)$'; then
              echo "FAIL: native library at bundle root -> old layout (loader rejects this)"; status=1
            fi
            if ! unzip -Z1 "$d" | grep -qE '^lib/[^/]+/mod\.(so|dll|dylib)$'; then
              echo "FAIL: no lib/<platform>/mod.* entry (expected new layout)"; status=1
            fi
          done
          exit $status

      - name: Validate WGSL shaders
        run: |
          status=0
          for f in mods/*/res/*.wgsl; do
            if build/wgsl_validate "$f" > /tmp/out.txt 2>&1; then
              echo "OK   $f"
            else
              echo "FAIL $f"; cat /tmp/out.txt; status=1
            fi
          done
          exit $status

  hook-repro:
    name: Hook resolution reproduction (Windows)
    # Self-contained: a stub "game" host replays the loader's hook-resolution + declared-target
    # logic against a real MSVC-built mod, to reproduce the "undeclared target" failure without a
    # real game binary. Always runs; needs no game import library.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Enable Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install dependencies
        run: choco install ninja

      - name: Build & run all toolchain/config variants, then assert clang-cl is correct
        shell: pwsh
        run: |
          # Records the finding and guards against regression: DEFINE_HOOK records must land in the
          # modmeta section and resolve/declare cleanly. clang-cl MUST pass; plain cl is shown for
          # contrast (it strips the records under /OPT:REF), which is why our mods build clang-cl.
          function Run-Variant($name, $mustPass, $extraArgs) {
            Write-Host "==================== $name ===================="
            $dir = "build-$name"
            cmake -S tools/hook_repro -B $dir -G Ninja @extraArgs 2>&1 | Out-Null
            cmake --build $dir 2>&1 | Out-Null
            $code = 99
            if (Test-Path "$dir/host.exe") {
              Push-Location $dir
              & ./host.exe
              $code = $LASTEXITCODE
              Pop-Location
            } else {
              Write-Host "BUILD FAILED for $name (no host.exe)"
            }
            Write-Host ""
            if ($mustPass -and $code -ne 0) {
              Write-Host "::error::$name must resolve all hook targets (exit $code)"
              exit 1
            }
          }
          Run-Variant "cl-relwithdebinfo" $false @("-DCMAKE_BUILD_TYPE=RelWithDebInfo")
          Run-Variant "cl-release"        $false @("-DCMAKE_BUILD_TYPE=Release")
          Run-Variant "clangcl-relwithdebinfo" $true @("-DCMAKE_BUILD_TYPE=RelWithDebInfo","-DCMAKE_C_COMPILER=clang-cl","-DCMAKE_CXX_COMPILER=clang-cl")
          Run-Variant "clangcl-release"   $true @("-DCMAKE_BUILD_TYPE=Release","-DCMAKE_C_COMPILER=clang-cl","-DCMAKE_CXX_COMPILER=clang-cl")

  build-windows:
    name: Build mods (Windows x86_64)
    runs-on: windows-latest
    # Requires a mainline Dusklight platform release providing the Windows import library, matching
    # the game build the mods are installed into. Set the repo variable PLATFORM_RELEASE_TAG (and
    # optionally PLATFORM_REPO) to that release's tag to enable; leave it unset to skip (the Linux
    # job still validates the port). Build the .dusk packages locally against your own Dusklight
    # tree with -DDUSK_GAME_EXE=<path to sdk/windows-x86_64.lib> when no release is published.
    # Defaults to the platform-v2-test release (commit 30def245 base — matches the current
    # submodule pin and the game build the user runs). Override PLATFORM_RELEASE_TAG / PLATFORM_REPO
    # repo variables to point elsewhere. If the platform repo is private, add a PAT that can read it
    # as the PLATFORM_REPO_TOKEN secret; otherwise the default GITHUB_TOKEN is used (public repos).
    env:
      PLATFORM_REPO: ${{ vars.PLATFORM_REPO || 'automata-rtx/dusklight-ao' }}
      RELEASE_TAG: ${{ vars.PLATFORM_RELEASE_TAG || 'platform-v2-test' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Enable Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install dependencies
        run: choco install ninja

      - name: Download game import library (platform release)
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN || github.token }}
        # The mainline linking rework renamed the import library dusklight.lib -> windows-amd64.lib
        # (published by platform-v2-test). Download whatever windows-*.lib the release provides.
        run: >
          gh release download ${{env.RELEASE_TAG}}
          --repo ${{env.PLATFORM_REPO}}
          --pattern "windows-*.lib"
          --dir sdk-assets

      - name: Locate import library
        id: implib
        shell: pwsh
        run: |
          $lib = Get-ChildItem sdk-assets -Filter "windows-*.lib" | Select-Object -First 1
          if (-not $lib) { Write-Host "::error::no windows-*.lib found in the platform release"; exit 1 }
          Write-Host "Using import library: $($lib.FullName)"
          "path=$($lib.FullName)" >> $env:GITHUB_OUTPUT

      - name: Configure
        # clang-cl is REQUIRED on Windows: plain MSVC (cl) mishandles the mod SDK's modmeta
        # section (__declspec(allocate("modmeta$d")) on the DEFINE_HOOK template statics), stripping
        # the hook records under /OPT:REF and emitting a malformed layout otherwise, so hook targets
        # never register. The SDK only grants the record-retention attribute under clang. Verified
        # by the hook-repro job.
        run: >
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl
          "-DDUSK_GAME_EXE=${{ steps.implib.outputs.path }}"

      - name: Build
        run: cmake --build build

      - name: Upload mod packages
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-mods-win64
          path: build/mods/*.dusk
