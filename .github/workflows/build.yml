name: Build mods

# Mods-only CI: compiles the two mod libraries against the Dusklight mod SDK (headers +
# prebuilt Dawn package) - the game and aurora are NEVER compiled here. Typical runtime
# is a few minutes.
#
# ABI contract: extern/dusklight is pinned to the platform-v1 release commit of
# automata-rtx/dusklight-ao, and the Windows job links against that release's
# dusklight.lib. When the base game is re-platformed, bump the submodule AND the
# RELEASE_TAG below together.

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
  workflow_dispatch:

env:
  PLATFORM_REPO: automata-rtx/dusklight-ao
  RELEASE_TAG: platform-v1

jobs:
  validate:
    name: Compile check + WGSL validation (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install ninja-build

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DMODS_BUILD_TOOLS=ON
          -DDUSK_VERSION_OVERRIDE=${{env.RELEASE_TAG}}

      - name: Build mods + validator
        run: cmake --build build

      - name: Validate WGSL shaders
        run: |
          status=0
          for f in mods/*/res/*.wgsl; do
            if build/wgsl_validate "$f" > /tmp/out.txt 2>&1; then
              echo "OK   $f"
            else
              echo "FAIL $f"; cat /tmp/out.txt; status=1
            fi
          done
          exit $status

  build-windows:
    name: Build mods (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Enable Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install dependencies
        run: choco install ninja

      - name: Download game import library (platform release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release download ${{env.RELEASE_TAG}}
          --repo ${{env.PLATFORM_REPO}}
          --pattern dusklight.lib
          --dir sdk-assets

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DDUSK_GAME_IMPLIB=${{github.workspace}}/sdk-assets/dusklight.lib
          -DDUSK_VERSION_OVERRIDE=${{env.RELEASE_TAG}}

      - name: Build
        run: cmake --build build

      - name: Upload mod packages
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-mods-win64
          path: build/mods/*.dusk
